# ovirt-web-ui-ng.conf -- Apache drop-in for the engine's httpd instance.
#
# Installed by ovirt-web-ui-ng.spec to %{_sysconfdir}/httpd/conf.d/ as
# zz-ovirt-web-ui-ng.conf. It maps the same-origin sub-path
# /ovirt-engine/web-ui-ng/ to our static SPA build.
#
# LOAD ORDER MATTERS: the engine's z-ovirt-engine-proxy.conf sends ALL of
# /ovirt-engine/* to WildFly via `<LocationMatch ^/ovirt-engine($|/)>` +
# ProxyPassMatch. This file must load AFTER it (hence the zz- filename) so the
# `ProxyPass !` below wins the Location merge and excludes our static sub-path
# from that proxy — otherwise requests 404 from WildFly and the Alias never runs.
#
# Security response headers mirror docs/SECURITY-HEADERS.md. frame-ancestors
# lives ONLY here (a <meta> CSP cannot express it); everything else duplicates
# the app's <meta> CSP so the header wins even if the meta is stripped.

Alias /ovirt-engine/web-ui-ng /usr/share/ovirt-engine/ovirt-web-ui-ng

<Directory "/usr/share/ovirt-engine/ovirt-web-ui-ng">
    Require all granted
    Options -Indexes -MultiViews
    AllowOverride None

    # SPA history fallback: unknown paths under the base return index.html so
    # client-side (TanStack) routes resolve. Real asset files are served as-is.
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteBase /ovirt-engine/web-ui-ng/
        RewriteCond %{REQUEST_FILENAME} -f [OR]
        RewriteCond %{REQUEST_FILENAME} -d
        RewriteRule ^ - [L]
        RewriteRule ^ index.html [L]
    </IfModule>

    # Content-hashed assets are immutable and safe to cache forever.
    <IfModule mod_headers.c>
        <FilesMatch "\.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$">
            Header set Cache-Control "public, max-age=31536000, immutable"
        </FilesMatch>
        # index.html must never be cached or clients pin a stale asset manifest.
        <FilesMatch "^index\.html$">
            Header set Cache-Control "no-cache, no-store, must-revalidate"
        </FilesMatch>
        # config.js is deploy-time config (window.ovirtWebUiConfig) edited in
        # place; never cache it or admin edits won't take effect. This block is
        # AFTER the immutable .js rule above, so its Header set wins for config.js.
        <FilesMatch "^config\.js$">
            Header set Cache-Control "no-cache, no-store, must-revalidate"
        </FilesMatch>
    </IfModule>
</Directory>

# --- Exclude our sub-path from the AJP proxy + set security headers ---------
# Scoped to our sub-path so we never override the engine's own responses.
<Location /ovirt-engine/web-ui-ng>
    # Serve our static Alias here instead of proxying to WildFly. This overrides
    # z-ovirt-engine-proxy.conf's <LocationMatch ^/ovirt-engine($|/)> only
    # because this file loads AFTER it (zz- prefix — see the note up top).
    ProxyPass !
    <IfModule mod_headers.c>
        # unsafe-inline in style-src: PatternFly 6 + Victory inject inline
        # styles at runtime; script has NO unsafe-inline. connect-src allows the
        # same-origin REST API plus the wss: websocket-proxy for the noVNC console.
        #
        # NOTE: the multi-engine server picker does NOT exist in this
        # integrated deployment — the RPM ships the default build, which
        # compiles the capability out (see docs/SECURITY-HEADERS.md
        # "Multi-engine deployments"). connect-src here never needs foreign
        # engine origins; multi-engine is a proxy/external-deploy feature.
        Header always set Content-Security-Policy "default-src 'self'; connect-src 'self' wss:; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'"
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "DENY"
        Header always set Referrer-Policy "no-referrer"
        # HSTS: the engine is HTTPS-only; 2 years, include subdomains.
        Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    </IfModule>
</Location>
