# ovirt-sso-cors.conf — enable cross-origin LOGIN against this oVirt/OLVM
# engine for an externally-hosted ovirt-web-ui-ng console.
#
# Install on the ENGINE host as /etc/httpd/conf.d/99-ovirt-sso-cors.conf,
# edit the allowed-origins regex below, then `systemctl reload httpd`.
# Remove the file (and reload) to disable. See README.md in this directory
# for the full story, including the engine-config half.
#
# WHY: the engine's REST API honors CORS via
#   engine-config -s CORSSupport=true -s CORSAllowedOrigins=<console origin>
# but the SSO webapp's CORS filter is registered under a url-pattern that can
# never match its OAuth endpoints (enginesso web.xml maps /sso/* inside a
# context already rooted at /ovirt-engine/sso), so cross-origin browser login
# is silently blocked even with CORSSupport=true. Engine builds carrying the
# fixed mapping (url-pattern /oauth/*) do NOT need this file; this drop-in
# provides the same headers from Apache for stock engines.
#
# SCOPE: only /ovirt-engine/sso/oauth/* (token, token-http-auth, token-info,
# revoke) — the interactive login pages and OpenID endpoints are untouched.

<LocationMatch "^/ovirt-engine/sso/oauth/">
    # EDIT ME: one alternative per allowed console origin — scheme + host
    # [+ port], no trailing slash, regex-escaped dots. Examples:
    #   ^(https://console\.example\.com)$
    #   ^(https://console\.example\.com|https://console2\.example\.com:8443)$
    SetEnvIfNoCase Origin "^(https://console\.example\.com)$" CORS_ALLOW_ORIGIN=$1

    # Echo the (matched) origin back; requests from other origins get no CORS
    # headers at all, so browsers keep blocking them.
    Header always set Access-Control-Allow-Origin "%{CORS_ALLOW_ORIGIN}e" env=CORS_ALLOW_ORIGIN
    Header always set Access-Control-Allow-Methods "GET, POST, OPTIONS" env=CORS_ALLOW_ORIGIN
    # Authorization carries the Basic credentials of the SSO password grant
    # (and matches what the engine's own CORS filter allows on the API).
    Header always set Access-Control-Allow-Headers "Accept, Authorization, Content-Type" env=CORS_ALLOW_ORIGIN
    Header always set Access-Control-Max-Age "600" env=CORS_ALLOW_ORIGIN
    # Responses vary by Origin — keep shared caches honest.
    Header always merge Vary "Origin"

    # Answer the browser's OPTIONS preflight here in Apache (2xx + the headers
    # above); the SSO servlet behind mod_proxy never needs to see it. R with a
    # non-3xx status ends rewriting and responds immediately (mod_rewrite).
    RewriteEngine On
    RewriteCond %{REQUEST_METHOD} =OPTIONS
    RewriteCond %{ENV:CORS_ALLOW_ORIGIN} !=""
    RewriteRule ^ - [R=204,L]
</LocationMatch>
