# nginx-sample.conf -- same-origin reverse proxy + static SPA host.
#
# Used by the Containerfile (and copyable onto any nginx host). Everything the
# browser hits is same-origin on THIS server: our static app under
# /ovirt-engine/web-ui-ng/ and the engine's REST/SSO/websocket-proxy under
# /ovirt-engine/ proxied to ${ENGINE_ORIGIN}. No CORS surface in any tier.
#
# ${ENGINE_ORIGIN} and ${CSP_CONNECT_EXTRA} are substituted at container
# start (envsubst) -- e.g. https://engine.lab.example.com and (multi-engine
# only) " https://engine2.example.com https://engine3.example.com". When
# copying this onto a bare nginx host, replace both by hand
# (CSP_CONNECT_EXTRA is usually just empty).
#
# Security response headers mirror docs/SECURITY-HEADERS.md. frame-ancestors is
# expressible ONLY as a header (the app's <meta> CSP cannot set it), so it lives
# here; the rest of the CSP duplicates the meta so the header is authoritative.

# Map the WebSocket Upgrade header so proxied websocket-proxy connections (the
# noVNC console at /ovirt-engine/websocket-proxy) are kept alive. "close" when
# absent lets normal HTTP keep-alive work.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Cache policy by extension. Content-hashed assets are immutable; everything
# else (notably index.html) must revalidate so clients never pin a stale asset
# manifest. Driven off the request URI so we keep ONE location block below and
# avoid nginx's add_header inheritance trap (an inner add_header replaces, not
# merges, the parent's -- which would silently drop the security headers).
map $uri $ovirt_cache_control {
    default                                       "no-cache, no-store, must-revalidate";
    # config.js is deploy-time config edited in place — never cache it. Listed
    # BEFORE the immutable rule so this regex wins (nginx map: first match).
    "~*/config\.js$"                              "no-cache, no-store, must-revalidate";
    "~*\.(?:js|css|woff2?|svg|png|jpe?g|gif|ico)$" "public, max-age=31536000, immutable";
}

server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    # SPA build lives here (copied in by the Containerfile).
    root /usr/share/nginx/html;
    index index.html;

    # Reasonable upload ceiling; the API proxies below inherit it.
    client_max_body_size 64m;

    # --- Static app ---------------------------------------------------------
    # Served at the same sub-path the engine host would use, so the app's Vite
    # `base` and injected token flow behave identically to the RPM deploy.
    location /ovirt-engine/web-ui-ng/ {
        # try the real file, else fall back to index.html for client routing.
        try_files $uri $uri/ /ovirt-engine/web-ui-ng/index.html;

        # Cache policy from the $uri map above (immutable assets vs no-store HTML).
        add_header Cache-Control $ovirt_cache_control always;

        # Multi-engine: ${CSP_CONNECT_EXTRA} (envsubst, default empty) appends
        # engine origins to connect-src so the console may fetch the engines
        # listed in config.js — e.g. " https://engine2.example.com" (space-
        # separated origins). Empty keeps the strict single-engine policy.
        # The Containerfile bakes a matching __CSP_CONNECT_EXTRA__ placeholder
        # into index.html's <meta> CSP; sub_filter swaps it with the SAME
        # value at serve time so header and meta never disagree.
        sub_filter '__CSP_CONNECT_EXTRA__' '${CSP_CONNECT_EXTRA}';
        sub_filter_once on;

        # Security headers (see docs/SECURITY-HEADERS.md). `always` so they are
        # emitted on error responses too. Single location => no add_header
        # inheritance surprises; all responses under the sub-path get these.
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' wss: ${CSP_CONNECT_EXTRA}; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    }

    # Convenience redirect: bare sub-path without trailing slash.
    location = /ovirt-engine/web-ui-ng {
        return 301 /ovirt-engine/web-ui-ng/;
    }

    # --- Engine reverse proxy ----------------------------------------------
    # Everything else under /ovirt-engine/ (REST api, sso, services, images,
    # and the websocket-proxy) is forwarded to the real engine. Kept AFTER the
    # web-ui-ng location so our static app wins for its own sub-path.
    location /ovirt-engine/ {
        # ${ENGINE_ORIGIN} is replaced by envsubst at container start with a
        # LITERAL origin (scheme+host[:port], NO trailing slash, NO path), e.g.
        # https://engine.local -- so nginx sees a static proxy_pass and appends
        # the request URI automatically (no resolver needed). If you hand-edit
        # this on a bare host, substitute the same bare-origin form.
        proxy_pass ${ENGINE_ORIGIN};

        # Preserve host so the engine's SSO/redirects build correct URLs.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade for the console websocket-proxy.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Consoles are long-lived; don't cut the socket on idle.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        # SECURE BY DEFAULT (docs/SECURITY.md §4): verify the engine's TLS cert
        # on the nginx->engine hop so an attacker on that network path cannot
        # MITM the bearer-token traffic with a forged cert. Point
        # proxy_ssl_trusted_certificate at the engine CA bundle.
        #   For a LAB with self-signed engine certs ONLY, flip to `off` — an
        #   explicit, commented opt-in, never the shipped default.
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /etc/pki/ovirt-engine/ca.pem;
    }

    # Land the bare site root on the app.
    location = / {
        return 302 /ovirt-engine/web-ui-ng/;
    }
}
