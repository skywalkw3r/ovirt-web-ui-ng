# inventory.example.ini — copy to inventory.ini, then keep the addresses in
# sync with vars.yml (INI inventories cannot reference vars files, so the
# wiring is by convention — the comments on each group say which contract
# variable each value must match):
#
#   cp inventory.example.ini inventory.ini
#
# [pve]        The Proxmox VE host. 01-provision-proxmox-vm.yml delegates a
#              few tasks here over SSH (image download/cache, cloud-init
#              snippet upload, 'qm set --import-from' boot-disk import)
#              because the PVE API refuses absolute-path disk imports for
#              API-token authentication. ansible_host is usually the same
#              address as proxmox_api_host in vars.yml; on a cluster it must
#              be the node named by proxmox_node. ansible_user=root is the
#              PVE norm — a non-root sudo user also works (the delegated
#              tasks use become).
#
# [ovirt_node] The lab VM that 01-provision-proxmox-vm.yml creates and that
#              02/03/04 configure. ansible_host MUST equal node_ip in
#              vars.yml (cloud-init assigns that static address) and the
#              inventory hostname mirrors node_fqdn. Login is root: cloud-init
#              installs lab_ssh_public_key on the root account, because the
#              hosted-engine installer must run as root anyway.

# The alias 'pve-host' is arbitrary (kept different from the group name to
# avoid an Ansible warning) — only ansible_host matters.
[pve]
pve-host ansible_host=proxmox.lab.homelabz.xyz ansible_user=root

[pve:vars]
# First contact with the PVE host would otherwise fail with "Host key
# verification failed" (TOFU: accepts the key on first connect, still
# refuses CHANGED keys afterwards). Key auth must already work:
#   ssh-copy-id root@<pve-host>
ansible_ssh_common_args=-o StrictHostKeyChecking=accept-new
# Password auth instead of keys? Install sshpass and run with -k, or export
# PVE_SSH_PASSWORD and uncomment (templated at use time — no secret in file):
# ansible_password={{ lookup('env', 'PVE_SSH_PASSWORD') }}

[ovirt_node]
node.lab.homelabz.xyz ansible_host=10.5.5.40 ansible_user=root

[ovirt_node:vars]
# The lab VM gets rebuilt often. accept-new avoids the interactive host-key
# prompt on first contact; 01-provision-proxmox-vm.yml removes stale
# known_hosts entries whenever it creates the VM fresh, so re-provisioning
# does not trip host-key-mismatch errors either.
ansible_ssh_common_args=-o StrictHostKeyChecking=accept-new
ansible_python_interpreter=/usr/bin/python3
